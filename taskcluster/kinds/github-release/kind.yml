---
loader: taskgraph.loader.transform:loader

transforms:
    - ffios_taskgraph.transforms.github_release
    - taskgraph.transforms.task

tasks:
    publish:
      description: Create a Github release
      run-on-tasks-for: []
      treeherder:
        symbol: gh-r
        tier: 1
        kind: build
        platform: ios/opt
      worker-type: github
      shipping-phase: ship
      attributes:
        release-type: release
      worker:
        action: release
        git-tag: "{head_tag}"
        github-project:
          by-level:
            '3': firefox-ios
            default: staging-firefox-ios
        is-prerelease: false
        release-name:
          by-level:
            '3': "Firefox v{version}"
            default: "Staging Firefox v{version}"
        release-body:
          by-level:
            '3': "This is our official v{version} release of Firefox-iOS."
            default: "This is a staging release of firefox-iOS v{version}. It should not be used."
